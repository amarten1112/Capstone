# =============================================================================
# .github/workflows/deploy.yml
# Virginia Market Square — Auto-Deploy to IONOS Shared Hosting
# =============================================================================
#
# HOW THIS WORKS:
#   1. You push code to the 'main' branch on GitHub
#   2. This workflow triggers automatically on GitHub's servers
#   3. It builds a production config.php from your GitHub Secrets
#   4. It uploads changed/new files to IONOS via SFTP using lftp
#   5. Your live site updates — no manual FTP needed
#
# PROTOCOL NOTE:
#   IONOS uses SFTP (SSH File Transfer Protocol) on port 22.
#   SamKirkland/FTP-Deploy-Action does NOT support SFTP — using lftp instead.
#
# --delete NOTE:
#   Intentionally removed. --delete caused permission errors trying to remove
#   IONOS system folders (logs/, etc.) on the server root. On shared hosting
#   you should never run --delete against / anyway — too risky.
#   To manually remove a file from the server, use IONOS File Manager.
# =============================================================================

name: Deploy to IONOS

# Only triggers on pushes to 'main'
# Feature branches will NOT trigger a deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Upload to IONOS via SFTP
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # STEP 1: Check out repository code onto the GitHub runner VM
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # STEP 2: Set up PHP on the runner
      # Needed so Composer can install the Stripe SDK when you reach Phase 6
      # -----------------------------------------------------------------------
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, curl

      # -----------------------------------------------------------------------
      # STEP 3: Install Composer dependencies if composer.json exists
      # Safely skipped with a message if you haven't set up Composer yet
      # -----------------------------------------------------------------------
      - name: Install Composer dependencies (if composer.json exists)
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "Composer install complete"
          else
            echo "No composer.json found — skipping Composer install"
          fi

      # -----------------------------------------------------------------------
      # STEP 4: Generate production config.php from GitHub Secrets
      #
      # config.php is in .gitignore — it never exists in the repo.
      # This step creates it on the runner VM using your stored secrets,
      # then lftp uploads it to the server with everything else.
      # Secret values are never visible in logs or source code.
      #
      # STRIPE KEYS: Commented out until Phase 6. When ready:
      #   1. Uncomment the two define() lines below
      #   2. Add STRIPE_PUBLIC_KEY and STRIPE_SECRET_KEY to GitHub Secrets
      # -----------------------------------------------------------------------
      - name: Generate production config.php from secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          mkdir -p includes

          cat > includes/config.php << 'PHPEOF'
          <?php
          /**
           * config.php — Auto-generated by GitHub Actions
           * Do not edit this file directly on the server.
           * Update GitHub Secrets and redeploy to change values.
           */

          $db_host = 'DB_HOST_PLACEHOLDER';
          $db_port = 3306;
          $db_user = 'DB_USER_PLACEHOLDER';
          $db_pass = 'DB_PASS_PLACEHOLDER';
          $db_name = 'DB_NAME_PLACEHOLDER';

          $conn = new mysqli($db_host, $db_user, $db_pass, $db_name, $db_port);

          if ($conn->connect_error) {
              die("Connection failed: " . $conn->connect_error);
          }

          $conn->set_charset("utf8");
          date_default_timezone_set('America/Chicago');

          // Stripe keys — uncomment in Phase 6 and add secrets to GitHub
          // define('STRIPE_PUBLIC_KEY', 'STRIPE_PK_PLACEHOLDER');
          // define('STRIPE_SECRET_KEY', 'STRIPE_SK_PLACEHOLDER');
          ?>
          PHPEOF

          # Replace placeholders with actual secret values
          # Using | as sed delimiter to safely handle special characters in passwords
          sed -i "s|DB_HOST_PLACEHOLDER|${DB_HOST}|g" includes/config.php
          sed -i "s|DB_USER_PLACEHOLDER|${DB_USER}|g" includes/config.php
          sed -i "s|DB_PASS_PLACEHOLDER|${DB_PASS}|g" includes/config.php
          sed -i "s|DB_NAME_PLACEHOLDER|${DB_NAME}|g" includes/config.php

          echo "config.php generated successfully"

      # -----------------------------------------------------------------------
      # STEP 5: Install lftp on the runner
      # lftp is a command-line transfer tool that natively speaks SFTP over SSH
      # It is available on GitHub's Ubuntu runners via apt
      # -----------------------------------------------------------------------
      - name: Install lftp
        run: sudo apt-get install -y lftp

      # -----------------------------------------------------------------------
      # STEP 6: Upload files to IONOS via SFTP
      #
      # mirror --reverse syncs local → remote (repo → server)
      # --ignore-time    compares files by content not timestamp
      #                  (runner VM clock differs from server clock)
      # --verbose        lists every file transferred in the Actions log
      #                  so you can confirm exactly what went up
      #
      # NOT using --delete because:
      #   IONOS has protected system folders (logs/ etc.) at the server root
      #   that would cause Permission Denied errors and fail the workflow.
      #   To remove a file from the server manually use IONOS File Manager.
      #
      # server root (/):
      #   Files land at the IONOS webspace root.
      #   If your site needs to be in a subfolder update the mirror
      #   target from ./ / to ./ /htdocs/ or wherever index.php should live.
      # -----------------------------------------------------------------------
      - name: Upload files to IONOS via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST << 'LFTPEOF'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror --reverse --verbose --ignore-time \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob logs/ \
            --exclude-glob *.sql \
            --exclude-glob *.docx \
            --exclude-glob *.pdf \
            --exclude-glob README.md \
            --exclude-glob .gitignore \
            --exclude-glob config.example.php \
            --exclude-glob CAPSTONE_* \
            --exclude-glob Advanced_Project_* \
            --exclude-glob Phase_2_Query_* \
            --exclude-glob Screenshot_* \
            --exclude-glob *_Flow.jpg \
            --exclude-glob *_Flow.pdf \
            --exclude-glob farmers_market_ER_diagram.* \
            --exclude-glob download.png \
            ./ /
          bye
          LFTPEOF