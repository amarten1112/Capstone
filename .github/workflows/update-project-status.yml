name: Update Project Board Status in README

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  issues:
    types: [opened, closed, edited, labeled, unlabeled, assigned, unassigned]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query Project Board via GraphQL
        id: project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          gh api graphql -f query='
          query {
            user(login: "amarten1112") {
              projectV2(number: 3) {
                items(first: 100) {
                  nodes {
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                      }
                    }
                    content {
                      ... on Issue {
                        assignees(first: 10) {
                          nodes {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          ' > project_data.json

          TODO=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Todo")] | length' project_data.json)
          IN_PROGRESS=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "In Progress")] | length' project_data.json)
          DONE=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Done")] | length' project_data.json)

          MY_TODO=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Todo" and (.content.assignees.nodes // [] | map(.login) | contains(["amarten1112"])))] | length' project_data.json)
          MY_IN_PROGRESS=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "In Progress" and (.content.assignees.nodes // [] | map(.login) | contains(["amarten1112"])))] | length' project_data.json)
          MY_DONE=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Done" and (.content.assignees.nodes // [] | map(.login) | contains(["amarten1112"])))] | length' project_data.json)

          echo "todo=$TODO" >> $GITHUB_OUTPUT
          echo "in_progress=$IN_PROGRESS" >> $GITHUB_OUTPUT
          echo "done=$DONE" >> $GITHUB_OUTPUT
          echo "my_todo=$MY_TODO" >> $GITHUB_OUTPUT
          echo "my_in_progress=$MY_IN_PROGRESS" >> $GITHUB_OUTPUT
          echo "my_done=$MY_DONE" >> $GITHUB_OUTPUT

      - name: Update README
        env:
          TODO: ${{ steps.project.outputs.todo }}
          IN_PROGRESS: ${{ steps.project.outputs.in_progress }}
          DONE: ${{ steps.project.outputs.done }}
          MY_TODO: ${{ steps.project.outputs.my_todo }}
          MY_IN_PROGRESS: ${{ steps.project.outputs.my_in_progress }}
          MY_DONE: ${{ steps.project.outputs.my_done }}
        run: python3 .github/scripts/update_readme.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || (git add README.md && git commit -m "chore: update project board status [skip ci]" && git push)
