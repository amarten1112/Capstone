name: Update Project Board Status in README

on:
  schedule:
    - cron: '0 * * * *'
  issues:
    types: [opened, closed, edited, labeled, unlabeled, assigned, unassigned]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query Project Board via GraphQL
        id: project
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            query {
              user(login: "amarten1112") {
                projectV2(number: 3) {
                  items(first: 100) {
                    nodes {
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' > project_data.json

          TODO=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Todo")] | length' project_data.json)
          IN_PROGRESS=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "In Progress")] | length' project_data.json)
          DONE=$(jq '[.data.user.projectV2.items.nodes[] | select(.fieldValueByName.name == "Done")] | length' project_data.json)

          echo "todo=$TODO" >> $GITHUB_OUTPUT
          echo "in_progress=$IN_PROGRESS" >> $GITHUB_OUTPUT
          echo "done=$DONE" >> $GITHUB_OUTPUT

      - name: Update README with project board counts
        env:
          TODO: ${{ steps.project.outputs.todo }}
          IN_PROGRESS: ${{ steps.project.outputs.in_progress }}
          DONE: ${{ steps.project.outputs.done }}
        run: |
          python3 -c "
          import os, re
          from datetime import datetime, timezone
          todo = os.environ.get('TODO', '0')
          ip = os.environ.get('IN_PROGRESS', '0')
          done = os.environ.get('DONE', '0')
          ts = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
          sep = chr(124) + '--------' + chr(124) + '-------|'
          block = chr(10).join(['<!-- PROJECT-STATUS:START -->', chr(124) + ' Status ' + chr(124) + ' Count ' + chr(124), sep, chr(124) + ' U0001f534 Todo ' + chr(124) + ' ' + todo + ' ' + chr(124), chr(124) + ' U0001f7e1 In Progress ' + chr(124) + ' ' + ip + ' ' + chr(124), chr(124) + ' U0001f7e2 Done ' + chr(124) + ' ' + done + ' ' + chr(124), '', '*Last updated: ' + ts + '*', '<!-- PROJECT-STATUS:END -->'])
          with open('README.md', 'r', encoding='utf-8') as f: content = f.read()
          new = re.sub(r'<!-- PROJECT-STATUS:START -->.*?<!-- PROJECT-STATUS:END -->', block, content, flags=re.DOTALL)
          with open('README.md', 'w', encoding='utf-8') as f: f.write(new)
          print('Updated: Todo=' + todo + ', InProgress=' + ip + ', Done=' + done)
          "

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet || (git add README.md && git commit -m "chore: update project board status [skip ci]" && git push)
