name: Update Project Board Status in README

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Query Project Data
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          gh api graphql -f query='
          query {
            user(login: "amarten1112") {
              projectV2(number: 3) {
                items(first: 100) {
                  nodes {
                    fieldValueByName(name: "Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue {
                        name
                      }
                    }
                    content {
                      ... on Issue {
                        title
                        subIssuesSummary {
                          total
                          completed
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          ' > project_data.json

      - name: Update README Task List
        run: python3 .github/scripts/update_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update project board status [skip ci]" || exit 0
          git push
